<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Map Viewer</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.3.0/dist/maplibre-gl.css" />
    <link rel="stylesheet" href="https://unpkg.com/vuetify@3.8.0/dist/vuetify.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/@mdi/font@latest/css/materialdesignicons.min.css" />
    <link rel="stylesheet" href="https://fonts.bunny.net/css?family=roboto:400,500,700" />
    <style>
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        #app {
            height: 100%;
            width: 100%;
        }
        #map {
            height: 100%;
            width: 100%;
        }
    </style>
</head>

<body>
    <div id="app">
        <v-app>
            <v-main>
                <div id="map"></div>

                <div style="position: absolute; top: 10px; right: 10px; z-index: 1000;">
                    <v-card max-width="300" class="pa-2">
                        <v-select
                            v-model="basemap"
                            :items="basemapOptions"
                            label="底图选择"
                            dense
                            hide-details
                            class="mb-2"
                        ></v-select>

                        <v-slider
                            v-model="basemapOpacity"
                            label="透明度"
                            min="0"
                            max="1"
                            step="0.1"
                            hide-details
                        ></v-slider>

                        <v-text-field
                            v-model="centerLon"
                            label="经度"
                            type="number"
                            step="0.0001"
                            dense
                            hide-details
                            class="mt-2"
                        ></v-text-field>

                        <v-text-field
                            v-model="centerLat"
                            label="纬度"
                            type="number"
                            step="0.0001"
                            dense
                            hide-details
                        ></v-text-field>

                        <v-text-field
                            v-model="zoom"
                            label="缩放级别"
                            type="number"
                            min="2"
                            max="24"
                            step="0.1"
                            dense
                            hide-details
                        ></v-text-field>
                    </v-card>
                </div>
            </v-main>
        </v-app>
    </div>

    <script type="importmap">
        {
            "imports": {
                "vue": "https://unpkg.com/vue@3.5.17/dist/vue.esm-browser.js",
                "vuetify": "https://unpkg.com/vuetify@3.8.0/dist/vuetify.esm.js",
                "@vueuse/core": "https://unpkg.com/@vueuse/core@13.3.0/index.mjs"
            }
        }
    </script>
    <script type="module">
        import { createApp, ref, watch } from 'vue';
        import { createVuetify } from 'vuetify';
        import { useUrlSearchParams } from '@vueuse/core';

        const vuetify = createVuetify();
        const params = useUrlSearchParams('hash-params');

        createApp({
            setup() {
                const map = ref(null);
                const mapSources = ref({});

                const basemap = ref(params.basemap || 'gaode_normal');
                const basemapOpacity = ref(parseFloat(params.basemap_opacity || '1.0'));
                const centerLon = ref(parseFloat(params.lon || '116.419181'));
                const centerLat = ref(parseFloat(params.lat || '39.901624'));
                const zoom = ref(parseFloat(params.zoom || '10'));

                const basemapOptions = [
                    { title: '高德标准', value: 'gaode_normal' },
                    { title: '高德卫星', value: 'gaode_satellite' },
                    { title: 'OpenStreetMap', value: 'osm' },
                    { title: 'Esri卫星', value: 'satellite' }
                ];

                const initMapSources = () => {
                    return {
                        osm: {
                            type: 'raster',
                            tiles: [
                                'https://a.tile.openstreetmap.org/{z}/{x}/{y}.png',
                                'https://b.tile.openstreetmap.org/{z}/{x}/{y}.png',
                                'https://c.tile.openstreetmap.org/{z}/{x}/{y}.png'
                            ],
                            tileSize: 256,
                            maxzoom: 18,
                            attribution: '© OpenStreetMap contributors'
                        },
                        satellite: {
                            type: 'raster',
                            tiles: [
                                'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
                            ],
                            tileSize: 256,
                            maxzoom: 18,
                            attribution: 'Tiles © Esri'
                        },
                        gaode_normal: {
                            type: 'raster',
                            tiles: [
                                'http://wprd01.is.autonavi.com/appmaptile?x={x}&y={y}&z={z}&lang=zh_cn&size=1&scl=1&style=7',
                                'http://wprd02.is.autonavi.com/appmaptile?x={x}&y={y}&z={z}&lang=zh_cn&size=1&scl=1&style=7',
                                'http://wprd03.is.autonavi.com/appmaptile?x={x}&y={y}&z={z}&lang=zh_cn&size=1&scl=1&style=7',
                                'http://wprd04.is.autonavi.com/appmaptile?x={x}&y={y}&z={z}&lang=zh_cn&size=1&scl=1&style=7'
                            ],
                            tileSize: 256,
                            maxzoom: 18,
                            attribution: '© 高德/Gaode'
                        },
                        gaode_satellite: {
                            type: 'raster',
                            tiles: [
                                'http://wprd01.is.autonavi.com/appmaptile?x={x}&y={y}&z={z}&lang=zh_cn&size=1&scl=1&style=6',
                                'http://wprd02.is.autonavi.com/appmaptile?x={x}&y={y}&z={z}&lang=zh_cn&size=1&scl=1&style=6',
                                'http://wprd03.is.autonavi.com/appmaptile?x={x}&y={y}&z={z}&lang=zh_cn&size=1&scl=1&style=6',
                                'http://wprd04.is.autonavi.com/appmaptile?x={x}&y={y}&z={z}&lang=zh_cn&size=1&scl=1&style=6'
                            ],
                            tileSize: 256,
                            maxzoom: 18,
                            attribution: '© Gaode/AutoNavi'
                        }
                    };
                };

                const initMap = () => {
                    const emptyStyle = {
                        version: 8,
                        sources: {},
                        layers: []
                    };

                    map.value = new maplibregl.Map({
                        container: 'map',
                        style: emptyStyle,
                        center: [centerLon.value, centerLat.value],
                        zoom: zoom.value,
                        maplibreLogo: false,
                        minZoom: 2,
                        maxZoom: 24,
                        attributionControl: true
                    });

                    map.value.on('load', () => {
                        mapSources.value = initMapSources();
                        updateBasemap();
                    });

                    map.value.on('moveend', () => {
                        const center = map.value.getCenter();
                        centerLon.value = parseFloat(center.lng.toFixed(6));
                        centerLat.value = parseFloat(center.lat.toFixed(6));
                        zoom.value = parseFloat(map.value.getZoom().toFixed(2));

                        params.lon = centerLon.value.toString();
                        params.lat = centerLat.value.toString();
                        params.zoom = zoom.value.toString();
                    });
                };

                const updateBasemap = () => {
                    if (!map.value || !mapSources.value[basemap.value]) return;

                    if (map.value.getLayer('base-layer')) {
                        map.value.removeLayer('base-layer');
                    }
                    if (map.value.getSource('base-source')) {
                        map.value.removeSource('base-source');
                    }

                    map.value.addSource('base-source', mapSources.value[basemap.value]);
                    map.value.addLayer({
                        id: 'base-layer',
                        type: 'raster',
                        source: 'base-source',
                        paint: {
                            'raster-opacity': basemapOpacity.value
                        }
                    });
                };

                watch(basemap, updateBasemap);
                watch(basemapOpacity, (newOpacity) => {
                    if (map.value && map.value.getLayer('base-layer')) {
                        map.value.setPaintProperty('base-layer', 'raster-opacity', newOpacity);
                    }
                    params.basemap_opacity = newOpacity.toString();
                });

                watch([centerLon, centerLat, zoom], ([lon, lat, z]) => {
                    if (map.value) {
                        map.value.jumpTo({
                            center: [lon, lat],
                            zoom: z
                        });
                    }
                });

                watch(basemap, (newBasemap) => {
                    params.basemap = newBasemap;
                });

                initMap();

                return {
                    basemap,
                    basemapOpacity,
                    centerLon,
                    centerLat,
                    zoom,
                    basemapOptions
                };
            }
        }).use(vuetify).mount('#app');
    </script>
</body>
</html>
